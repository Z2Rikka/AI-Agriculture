version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eps32_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eps32}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eps32pass}
      POSTGRES_DB: ${POSTGRES_DB:-eps32db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eps32}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
